apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugging-voice
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hugging-voice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hugging-voice
      annotations:
        livekit-hugging-voice.resource-sizing: placeholder-must-be-validated-on-target-hardware
    spec:
      serviceAccountName: hugging-voice
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: service
          image: livekit-hugging-voice:local
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/hugging-voice/config.yaml"]
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HOME
              value: /cache/huggingface
            - name: TORCH_HOME
              value: /cache/torch
            - name: XDG_CACHE_HOME
              value: /cache
            - name: TMPDIR
              value: /tmp/hugging-voice
          resources:
            requests:
              cpu: "4"
              memory: 24Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "16"
              memory: 64Gi
              nvidia.com/gpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          startupProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/hugging-voice
              readOnly: true
            - name: models
              mountPath: /models
              readOnly: true
            - name: token
              mountPath: /run/secrets
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /cache
      volumes:
        - name: config
          configMap:
            name: hugging-voice-config
        - name: models
          persistentVolumeClaim:
            claimName: hugging-voice-models
        - name: token
          secret:
            secretName: hugging-voice-token
            items:
              - key: token
                path: hugging_voice_token
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: cache
          emptyDir:
            sizeLimit: 8Gi
