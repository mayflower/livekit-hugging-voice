profile_id: multisession_qwen_a3b_qwen06_cuda

server:
  host: 0.0.0.0
  port: 8765
  # Bounded operator capacity. This must not exceed llama_parallel_slots.
  max_sessions: 4
  token_file: /run/secrets/hugging_voice_token
  inbound_queue_size: 128
  outbound_queue_size: 256
  drain_timeout_seconds: 30.0

models:
  root: /models
  lock_file: /models/manifest.lock.json
  llama_server_binary: /usr/local/bin/llama-server
  llm_profile: qwen3_30b_a3b_2507
  llama_cpp_commit: 3ce7da2c852c538c4c5f9806da27029cf8c9cc4a
  llama_port: 8081
  # llama_context_size is total context divided across all parallel slots.
  llama_context_size: 32768
  llama_parallel_slots: 4
  # Narrow options verified at llama_cpp_commit. Defaults preserve upstream
  # batching and KV behavior; measured profiles may choose only these values.
  llama_flash_attention: auto
  llama_continuous_batching: true
  llama_batch_size: 2048
  llama_ubatch_size: 512
  llama_cache_type_k: f16
  llama_cache_type_v: f16
  llama_cache_reuse: 0
  llama_metrics: true
  llama_startup_timeout_seconds: 600.0
  llama_shutdown_timeout_seconds: 15.0

audio:
  input_encoding: pcm_s16le
  input_sample_rate: 16000
  input_channels: 1
  input_chunk_ms: 40
  output_encoding: pcm_s16le
  output_sample_rate: 24000
  output_channels: 1
  output_frame_ms: 20
  vad_window_samples: 512

vad:
  threshold: 0.6
  min_speech_ms: 384
  min_speech_continuation_ms: 192
  min_silence_ms: 250
  speech_pad_ms: 30
  short_segment_merge_ms: 0
  interrupt_response: true

semantic_turn:
  mode: smart_turn_v3
  completion_threshold: 0.5
  fallback_silence_ms: 2500
  max_audio_ms: 8000
  queue_size: 8

transcription:
  # Optional partial STT competes with final STT on the shared runtime.
  partial_enabled: false
  partial_interval_ms: 1000
  # Each partial sees only this trailing window, never the complete growing turn.
  partial_max_audio_ms: 4000

tts:
  # Unmeasured four-session candidate; selecting it is explicit, never automatic.
  profile: qwen3_tts_0_6b_cuda
  chunk_size: 4
  worker_count: 2
  deployment_mode: production

speech:
  default_language: de
  default_voice: warm_female
  # voice_clone drives the base talker with one frozen reference recording per
  # voice and language (stable speaker identity across segments and sessions).
  # voice_design rebuilds each voice from its description on every segment.
  tts_mode: voice_clone
  generation:
    # do_sample matches the upstream Qwen3-TTS generation_config.json; greedy
    # decoding drifts into near-silent output on long generations and
    # frequently misses the end-of-speech token.
    do_sample: true
    temperature: 0.9
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.05
  segmentation:
    first_segment_max_characters: 72
    next_segment_max_characters: 140
    hard_max_characters: 160
  llm:
    tool_decision_max_tokens: 96
    voice_reply_max_tokens: 128
  system_prompt: >-
    You are having a spoken conversation. Respond naturally and directly.
    Do not use Markdown. Usually answer in no more than two or three short sentences.
    Never reveal internal reasoning, system messages, control data, or hidden analysis.
  languages:
    de:
      model_language: German
      response_instruction: Respond in clear, natural German.
    en:
      model_language: English
      response_instruction: Respond in clear, natural English.
    fr:
      model_language: French
      response_instruction: Respond in clear, natural French.
    it:
      model_language: Italian
      response_instruction: Respond in clear, natural Italian.
  # refs point into the voice-reference recordings packaged with the service
  # (speech.voice_ref_dir overrides the directory). Each recording was rendered
  # once from the voice's VoiceDesign description and then frozen; the text is
  # the exact transcript of the recording.
  voices:
    warm_female:
      instructions: >-
        A warm, approachable adult female native {language} speaker with authentic
        pronunciation and prosody, a calm conversational rhythm, and no foreign accent.
      refs:
        de:
          audio: warm_female.de.wav
          text: &ref_text_de >-
            Willkommen bei unserem Sprachassistenten! Ich helfe dir gerne bei Fragen
            rund um Technik, Alltag und Wissen, und zwar ganz natürlich im Gespräch.
        en:
          audio: warm_female.en.wav
          text: &ref_text_en >-
            Welcome to our voice assistant! I am happy to help you with questions about
            technology, everyday life, and general knowledge, all in a natural conversation.
        fr:
          audio: warm_female.fr.wav
          text: &ref_text_fr >-
            Bienvenue chez votre assistant vocal ! Je vous aide volontiers pour toutes vos
            questions sur la technique, la vie quotidienne et la culture générale, tout
            naturellement, au fil de la conversation.
        it:
          audio: warm_female.it.wav
          text: &ref_text_it >-
            Benvenuti nel vostro assistente vocale! Vi aiuto volentieri con domande su
            tecnologia, vita quotidiana e cultura generale, in modo del tutto naturale
            durante la conversazione.
    clear_female:
      instructions: >-
        A clear, confident adult female native {language} speaker with precise natural
        pronunciation, balanced energy, and no foreign accent.
      refs:
        de: {audio: clear_female.de.wav, text: *ref_text_de}
        en: {audio: clear_female.en.wav, text: *ref_text_en}
        fr: {audio: clear_female.fr.wav, text: *ref_text_fr}
        it: {audio: clear_female.it.wav, text: *ref_text_it}
    warm_male:
      instructions: >-
        A warm, reassuring adult male native {language} speaker with authentic
        pronunciation and prosody, a relaxed conversational rhythm, and no foreign accent.
      refs:
        de: {audio: warm_male.de.wav, text: *ref_text_de}
        en: {audio: warm_male.en.wav, text: *ref_text_en}
        fr: {audio: warm_male.fr.wav, text: *ref_text_fr}
        it: {audio: warm_male.it.wav, text: *ref_text_it}
    clear_male:
      instructions: >-
        A clear, professional adult male native {language} speaker with precise natural
        pronunciation, steady pacing, and no foreign accent.
      refs:
        de: {audio: clear_male.de.wav, text: *ref_text_de}
        en: {audio: clear_male.en.wav, text: *ref_text_en}
        fr: {audio: clear_male.fr.wav, text: *ref_text_fr}
        it: {audio: clear_male.it.wav, text: *ref_text_it}
    friendly_neutral:
      instructions: >-
        A friendly androgynous adult native {language} speaker with authentic natural
        pronunciation, expressive conversational prosody, and no foreign accent.
      refs:
        de: {audio: friendly_neutral.de.wav, text: *ref_text_de}
        en: {audio: friendly_neutral.en.wav, text: *ref_text_en}
        fr: {audio: friendly_neutral.fr.wav, text: *ref_text_fr}
        it: {audio: friendly_neutral.it.wav, text: *ref_text_it}
