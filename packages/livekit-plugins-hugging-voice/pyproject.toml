[build-system]
requires = ["hatchling==1.31.0"]
build-backend = "hatchling.build"

[project]
name = "livekit-plugins-hugging-voice"
version = "0.2.0"
description = "Native LiveKit Agents realtime plugin for a local Hugging Voice service"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10,<3.15"
authors = [{ name = "livekit-hugging-voice contributors" }]
dependencies = [
  "aiohttp==3.14.2",
  "hugging-voice-protocol==0.2.0",
  "livekit-agents==1.6.6",
]

[tool.uv.sources]
hugging-voice-protocol = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["livekit"]

[tool.hatch.build.targets.sdist]
include = ["/livekit", "/tests", "/README.md", "/pyproject.toml"]
